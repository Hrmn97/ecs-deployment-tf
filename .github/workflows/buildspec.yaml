name: Terraform Deploy

on:
  push:
    branches:
      - master

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # After apply, read outputs and write them into GITHUB_ENV so
      # any subsequent job/step in this workflow can reference them as
      # ${{ env.ECR_REPOSITORY }} etc.
      - name: Export Terraform outputs to GitHub env
        run: |
          echo "ECR_REPOSITORY=$(terraform output -raw ecr_repository_name)"            >> $GITHUB_ENV
          echo "ECR_REPOSITORY_URI=$(terraform output -raw ecr_repository_uri)"          >> $GITHUB_ENV
          echo "ECS_SERVICE=$(terraform output -raw ecs_service_name)"                   >> $GITHUB_ENV
          echo "ECS_CLUSTER=$(terraform output -raw ecs_cluster_id)"                     >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION=$(terraform output -raw ecs_task_definition_family)" >> $GITHUB_ENV
          echo "CONTAINER_NAME=$(terraform output -raw container_name)"                  >> $GITHUB_ENV
  
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve